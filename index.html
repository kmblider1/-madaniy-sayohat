<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MSK — Madaniy Sayohat Kundaligi</title>
<link rel="icon" href="images/msk-icon.svg" type="image/svg+xml"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon" style="background:none;box-shadow:none;width:80px;height:80px;font-size:0">
        <img src="images/msk-icon.svg" width="80" height="80" alt="MSK Logo"/>
      </div>
      <h1>Xush kelibsiz</h1>
      <p class="sub">문화여행 • Madaniy sayohat kundaligi</p>
    </div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="setLoginRole('student')">👨‍🎓 Talaba</button>
      <button class="login-tab" onclick="setLoginRole('teacher')">👨‍🏫 O'qituvchi</button>
    </div>
    <div class="l-field">
      <label class="l-label">Email</label>
      <input class="l-input" id="login-email" placeholder="sardor@mail.uz"/>
    </div>
    <div class="l-field">
      <label class="l-label">Parol</label>
      <input class="l-input" id="login-pass" type="password" placeholder="••••"/>
    </div>
    <div id="login-error">Email yoki parol noto'g'ri!</div>
    <button class="login-btn" onclick="doLogin()">Kirish →</button>
    <div class="demo-hint">Demo talaba: <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="d6a5b7a4b2b9a496bbb7bfbaf8a3ac">[email&#160;protected]</a> / 123</div>
    <div class="demo-hint">Demo o'qituvchi: <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="691d0c080a010c1b2904080005471c13">[email&#160;protected]</a> / 123</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="app" style="display:none">
  <div id="sb-overlay" class="sb-overlay" onclick="toggleSidebar()"></div>

  <div id="sidebar" class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">
        <div class="sb-logo-icon" style="background:none;box-shadow:none;width:42px;height:42px">
          <img src="images/msk-icon.svg" width="42" height="42" alt="MSK"/>
        </div>
        <span class="sb-logo-text">MSK</span>
      </div>
      <p style="font-size:9px;letter-spacing:1px">문화여행 PORTFOLIO</p>
    </div>
    <div class="sb-nav" id="sidebar-nav"></div>
    <div style="padding:8px 10px">
      <div class="nav-item" onclick="doLogout()" style="color:rgba(255,255,255,.25)">
        <span class="ni-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </span>Chiqish
      </div>
    </div>
    <div class="sb-user">
      <div class="sb-avatar" id="sb-avatar">SA</div>
      <div>
        <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.8)" id="sb-name">Sardor</div>
        <div style="font-size:10px;color:rgba(255,255,255,.25)" id="sb-role">KT-301</div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger-btn" onclick="toggleSidebar()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="16" y2="12"/><line x1="3" y1="18" x2="19" y2="18"/></svg>
        </button>
        <h1 id="page-title">Bosh sahifa</h1>
      </div>
      <div class="tb-actions">
        <button class="tb-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
        <div style="position:relative">
          <button class="tb-btn" onclick="toggleNotifs()">🔔<div class="notif-dot" id="notif-dot"></div></button>
          <div class="notif-panel" id="notif-panel">
            <div style="padding:16px 18px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border-subtle);font-family:var(--ff-display)">Bildirishnomalar</div>
            <div id="notif-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="pg-dashboard" class="page active"><div class="pg-content" id="dashboard-c"></div></div>
    <div id="pg-tahlil" class="page"><div class="pg-content" id="tahlil-c"></div></div>
    <div id="pg-dialog" class="page"><div class="pg-content" id="dialog-c"></div></div>
    <div id="pg-tajriba" class="page"><div class="pg-content" id="tajriba-c"></div></div>
    <div id="pg-gamification" class="page"><div class="pg-content" id="gamification-c"></div></div>
    <div id="pg-quiz" class="page"><div class="pg-content" id="quiz-c"></div></div>
    <div id="pg-journal" class="page"><div class="pg-content" id="journal-c"></div></div>
    <div id="pg-calendar" class="page"><div class="pg-content" id="calendar-c"></div></div>
    <div id="pg-map" class="page"><div class="pg-content" id="map-c"></div></div>
    <div id="pg-vr" class="page"><div class="pg-content" id="vr-c"></div></div>
    <div id="pg-kutubxona" class="page"><div class="pg-content" id="kutubxona-c"></div></div>
    <div id="pg-teacher" class="page"><div class="pg-content" id="teacher-c"></div></div>
    <div id="pg-profil" class="page"><div class="pg-content" id="profil-c"></div></div>
  </div>
</div>

<div id="badge-toast" class="toast hide"></div>
<div id="modal-contai
