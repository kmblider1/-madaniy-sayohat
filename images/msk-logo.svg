<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Main gradient: Indigo to Plum -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B5FC7"/>
      <stop offset="50%" style="stop-color:#7B5FB8"/>
      <stop offset="100%" style="stop-color:#9E5FA0"/>
    </linearGradient>
    <!-- Accent gradient for roof -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A4EB5"/>
      <stop offset="100%" style="stop-color:#8B5FAE"/>
    </linearGradient>
    <!-- Light glow -->
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#9E5FA0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#5B5FC7;stop-opacity:0"/>
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#5B5FC7" flood-opacity="0.2"/>
    </filter>
    <filter id="textshadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5B5FC7" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background circle (optional, for avatar use) -->
  <circle cx="200" cy="200" r="195" fill="url(#glow)" opacity="0.5"/>

  <!-- ═══ HANOK ROOF ═══ -->
  <g filter="url(#shadow)" transform="translate(200,115)">
    <!-- Main curved roof -->
    <path d="M-105,0 Q-95,-8 -80,-22 Q-40,-52 0,-58 Q40,-52 80,-22 Q95,-8 105,0" 
      fill="none" stroke="url(#grad2)" stroke-width="5" stroke-linecap="round"/>
    <!-- Roof ridge line -->
    <path d="M-95,-5 Q-35,-48 0,-52 Q35,-48 95,-5" 
      fill="url(#grad1)" opacity="0.12"/>
    <!-- Upward curved tips (처마) -->
    <path d="M-105,0 Q-112,-8 -118,-18" fill="none" stroke="url(#grad2)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M105,0 Q112,-8 118,-18" fill="none" stroke="url(#grad2)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Decorative ridge dot -->
    <circle cx="0" cy="-58" r="4" fill="url(#grad1)"/>
    <!-- Small ornamental tips -->
    <circle cx="-118" cy="-18" r="3" fill="#9E5FA0"/>
    <circle cx="118" cy="-18" r="3" fill="#5B5FC7"/>
    
    <!-- Second roof layer (lower) -->
    <path d="M-80,14 Q-70,8 -55,-2 Q-25,-22 0,-26 Q25,-22 55,-2 Q70,8 80,14" 
      fill="none" stroke="url(#grad2)" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M-80,14 Q-86,8 -90,2" fill="none" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M80,14 Q86,8 90,2" fill="none" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- ═══ BOOK (open) ═══ -->
  <g transform="translate(200,175)" filter="url(#shadow)">
    <!-- Left page -->
    <path d="M-6,0 Q-50,4 -68,10 L-68,65 Q-50,58 -6,55 Z" 
      fill="#F0EDE6" stroke="url(#grad1)" stroke-width="2" opacity="0.9"/>
    <!-- Right page -->
    <path d="M6,0 Q50,4 68,10 L68,65 Q50,58 6,55 Z" 
      fill="#F8F6F1" stroke="url(#grad1)" stroke-width="2" opacity="0.9"/>
    <!-- Spine -->
    <path d="M-6,0 L-6,55 Q0,57 6,55 L6,0 Q0,2 -6,0 Z" fill="url(#grad1)" opacity="0.2"/>
    <line x1="0" y1="2" x2="0" y2="54" stroke="url(#grad1)" stroke-width="1" opacity="0.3"/>
    
    <!-- Text lines on left page -->
    <line x1="-55" y1="20" x2="-16" y2="17" stroke="#5B5FC7" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
    <line x1="-58" y1="28" x2="-16" y2="25" stroke="#5B5FC7" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
    <line x1="-60" y1="36" x2="-16" y2="33" stroke="#5B5FC7" stroke-width="1.5" opacity="0.1" stroke-linecap="round"/>
    
    <!-- Text lines on right page -->
    <line x1="16" y1="17" x2="55" y2="20" stroke="#9E5FA0" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
    <line x1="16" y1="25" x2="58" y2="28" stroke="#9E5FA0" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
    <line x1="16" y1="33" x2="60" y2="36" stroke="#9E5FA0" stroke-width="1.5" opacity="0.1" stroke-linecap="round"/>
  </g>

  <!-- ═══ PATH / JOURNEY LINE ═══ -->
  <g transform="translate(200,245)">
    <!-- Winding path -->
    <path d="M-50,8 Q-30,0 -10,8 Q10,16 30,8 Q50,0 65,8" 
      fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4" opacity="0.4"/>
    <!-- Journey dots (milestones) -->
    <circle cx="-50" cy="8" r="3.5" fill="#5B5FC7" opacity="0.7"/>
    <circle cx="-10" cy="8" r="3.5" fill="#7B5FB8" opacity="0.7"/>
    <circle cx="30" cy="8" r="3.5" fill="#9E5FA0" opacity="0.7"/>
    <circle cx="65" cy="8" r="4" fill="url(#grad1)">
      <animate attributeName="r" values="4;5.5;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══ TEXT: 문화여행 ═══ -->
  <text x="200" y="295" text-anchor="middle" 
    font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" 
    font-size="28" font-weight="700" fill="url(#grad1)" filter="url(#textshadow)"
    letter-spacing="6">문화여행</text>

  <!-- ═══ TEXT: MSK ═══ -->
  <text x="200" y="335" text-anchor="middle" 
    font-family="'Playfair Display', Georgia, serif" 
    font-size="48" font-weight="900" fill="url(#grad1)" filter="url(#textshadow)"
    letter-spacing="12">MSK</text>

  <!-- ═══ Subtitle ═══ -->
  <text x="200" y="360" text-anchor="middle" 
    font-family="'Outfit', sans-serif" 
    font-size="11" fill="#5B5FC7" opacity="0.45"
    letter-spacing="4">MADANIY SAYOHAT KUNDALIGI</text>
</svg>
