<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B5FC7"/>
      <stop offset="50%" style="stop-color:#7B5FB8"/>
      <stop offset="100%" style="stop-color:#9E5FA0"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A4EB5"/>
      <stop offset="100%" style="stop-color:#8B5FAE"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#g1)"/>
  <rect x="6" y="6" width="108" height="108" rx="26" fill="url(#g1)" opacity="0.9"/>

  <!-- Inner glow -->
  <ellipse cx="60" cy="45" rx="40" ry="30" fill="#fff" opacity="0.08"/>

  <!-- Hanok roof -->
  <g transform="translate(60,38)">
    <path d="M-32,0 Q-28,-3 -24,-8 Q-12,-18 0,-20 Q12,-18 24,-8 Q28,-3 32,0" 
      fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <path d="M-32,0 Q-35,-3 -37,-8" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M32,0 Q35,-3 37,-8" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-20" r="2" fill="#fff"/>
    <circle cx="-37" cy="-8" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="37" cy="-8" r="1.5" fill="#fff" opacity="0.7"/>
  </g>

  <!-- Open book -->
  <g transform="translate(60,58)">
    <path d="M-3,0 Q-18,2 -24,5 L-24,22 Q-18,19 -3,18 Z" fill="#fff" opacity="0.3"/>
    <path d="M3,0 Q18,2 24,5 L24,22 Q18,19 3,18 Z" fill="#fff" opacity="0.4"/>
    <line x1="0" y1="1" x2="0" y2="17" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- MSK text -->
  <text x="60" y="100" text-anchor="middle" 
    font-family="'Playfair Display', Georgia, serif" 
    font-size="22" font-weight="900" fill="#fff" letter-spacing="4" opacity="0.95">MSK</text>
</svg>
